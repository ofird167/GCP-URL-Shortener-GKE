# Production configuration
replicaCount: 3

service:
  type: LoadBalancer
  port: 80

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "url-shortener-app-sa@devops-project.iam.gserviceaccount.com"

config:
  gcpProjectId: "devops-project"
  secretManagerType: "gcp"
  secretName: "url-shortener-secret"
  environment: "production"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
