{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "url-shortener.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations (and .Values.config.gcpProjectId (ne .Values.config.gcpProjectId "")) }}
  annotations:
    {{- if and .Values.config.gcpProjectId (ne .Values.config.gcpProjectId "") }}
    iam.gke.io/gcp-service-account: "url-shortener-app-sa@{{ .Values.config.gcpProjectId }}.iam.gserviceaccount.com"
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
