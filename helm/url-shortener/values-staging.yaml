# Staging configuration
replicaCount: 1

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true

config:
  gcpProjectId: ""
  secretManagerType: "gcp"
  secretName: "url-shortener-secret"
  environment: "staging"

resources:
  limits:
    cpu: 50m
    memory: 64Mi
  requests:
    cpu: 5m
    memory: 16Mi
